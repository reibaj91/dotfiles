# lazygit theme tuned to the dotfiles palette (BasicDotfiles / Ghostty teal).
# lazygit inherits the terminal's 16 colors by default; these override the accents
# so borders and selections match the Neovim / terminal look.
gui:
  nerdFontsVersion: "3"
  theme:
    activeBorderColor:
      - "#6FB2A9" # cyan
      - bold
    inactiveBorderColor:
      - "#666666" # bright black
    searchingActiveBorderColor:
      - "#E6E45A" # bright yellow
    optionsTextColor:
      - "#2B8BD2" # blue
    selectedLineBgColor:
      - "#16404D" # derived teal (matches editor visual selection)
    cherryPickedCommitBgColor:
      - "#16404D"
    cherryPickedCommitFgColor:
      - "#6FB2A9"
    unstagedChangesColor:
      - "#E52F31" # bright red
    defaultFgColor:
      - "#7C8B8D" # foreground
  authorColors:
    "*": "#AF6CB0" # magenta
